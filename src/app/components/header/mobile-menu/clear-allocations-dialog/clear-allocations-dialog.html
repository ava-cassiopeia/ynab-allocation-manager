<h2 mat-dialog-title>Clear allocations?</h2>

<mat-dialog-content>
  Are you sure you want to clear all of your allocations? This is irreversable.
</mat-dialog-content>

<mat-dialog-actions>
  <button class="ya-button flat" mat-dialog-close>Cancel</button>
  <button class="ya-button flat site-theme" (click)="clear()">Clear</button>
</mat-dialog-actions>
